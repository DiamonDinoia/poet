name: CodSpeed

on:
  push:
    branches:
      - "main"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  codspeed:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build benchmarks
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCODSPEED_MODE=simulation \
            -DPOET_BUILD_BENCHMARKS=ON \
            -DPOET_BUILD_TESTS=OFF \
            -DPOET_ENABLE_SANITIZERS=OFF \
            -DPOET_WARNINGS_AS_ERRORS=OFF
          cmake --build build --target poet_benchmarks --parallel

      - name: Run benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: |
            ./build/benchmarks/poet_compiler_comparison_bench
            ./build/benchmarks/poet_dispatch_bench
            ./build/benchmarks/poet_dispatch_optimization_bench
            ./build/benchmarks/poet_static_for_bench
            ./build/benchmarks/poet_dynamic_for_bench
            ./build/benchmarks/poet_dynamic_for_forms_bench
            ./build/benchmarks/poet_dynamic_for_emission_bench
